# LUU Y: API VNDirect/Vietcap chan IP may chu nuoc ngoai -> robot GitHub khong keo duoc data (0/702).
# Lich cron da tat. Viec cap nhat hang ngay do "may phat hanh" cua Khoa dam nhiem (che do kafi_gh_token trong dashboard).
# Giu workflow_dispatch de thu lai thu cong neu sau nay API mo.
name: Auto update data
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cap nhat du lieu 702 ma
        run: node scripts/update_data.js
      - name: Commit neu co thay doi
        run: |
          git config user.name "kafi-data-bot"
          git config user.email "kafi-bot@users.noreply.github.com"
          git add dashboard_data.js
          git diff --cached --quiet || git commit -m "Auto data update"
          git push
